name: vaarta
description: Real-Time Multilingual Voice Translation System by Neer Dwivedi, Shubhashish Garimella & Avichal Trivedi

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  permission_handler: ^11.3.0
  record: ^5.2.0
  just_audio: ^0.9.42
  provider: ^6.1.2
  http: ^1.2.0
  path_provider: ^2.1.5

dependency_overrides:
  record_linux: ^1.3.0
  record_windows: ^1.0.2
  record_web: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
